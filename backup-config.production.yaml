general:
  region: ap-southeast-2
  environment: production
  lambda_arn: arn:aws:lambda:ap-southeast-2:737696831915:function:nzshm-backup-service-prod-backup
  s3_batch_role_arn: arn:aws:iam::737696831915:role/nzshm-backup-batch-role
  tags:
    Project: NSHM
    ManagedBy: backup-cli
    CostCenter: GNS-Science
sources:
  toshi:
    display_name: "ToshiAPI (production \u2014 account 461564345538)"
    source_account_id: '461564345538'
    source_account_role_arn: arn:aws:iam::461564345538:role/nzshm-backup-reader
    source_account_restore_role_arn: arn:aws:iam::461564345538:role/nzshm-backup-restore
    s3_buckets:
    - arn: arn:aws:s3:::nzshm22-toshi-api-prod
      label: api-prod
    dynamodb_tables:
    - arn:aws:dynamodb:ap-southeast-2:461564345538:table/ToshiFileObject-PROD
    - arn:aws:dynamodb:ap-southeast-2:461564345538:table/ToshiIdentity-PROD
    - arn:aws:dynamodb:ap-southeast-2:461564345538:table/ToshiTableObject-PROD
    - arn:aws:dynamodb:ap-southeast-2:461564345538:table/ToshiThingObject-PROD
    dynamodb_export_format: DYNAMODB_JSON
    use_s3_batch: true
    batch_manifest_mode: inventory
  ths:
    display_name: "THS dataset (production \u2014 account 461564345538)"
    source_account_id: '461564345538'
    source_account_role_arn: arn:aws:iam::461564345538:role/nzshm-backup-reader
    source_account_restore_role_arn: arn:aws:iam::461564345538:role/nzshm-backup-restore
    s3_buckets:
    - arn: arn:aws:s3:::ths-dataset-prod
      label: dataset-prod
    dynamodb_tables: []
    dynamodb_export_format: DYNAMODB_JSON
    use_s3_batch: true
    batch_manifest_mode: inventory
  static:
    display_name: "Static reports (production \u2014 account 461564345538)"
    source_account_id: '461564345538'
    source_account_role_arn: arn:aws:iam::461564345538:role/nzshm-backup-reader
    source_account_restore_role_arn: arn:aws:iam::461564345538:role/nzshm-backup-restore
    s3_buckets:
    - arn: arn:aws:s3:::nzshm22-static-reports
      label: static-reports
    dynamodb_tables: []
    dynamodb_export_format: DYNAMODB_JSON
    use_s3_batch: true
    batch_manifest_mode: inventory
  weka:
    display_name: "Weka UI prod (production \u2014 account 461564345538)"
    source_account_id: '461564345538'
    source_account_role_arn: arn:aws:iam::461564345538:role/nzshm-backup-reader
    source_account_restore_role_arn: arn:aws:iam::461564345538:role/nzshm-backup-restore
    s3_buckets:
    - arn: arn:aws:s3:::nzshm22-weka-ui-prod
      label: weka-ui-prod
    dynamodb_tables: []
    dynamodb_export_format: DYNAMODB_JSON
    use_s3_batch: true
    batch_manifest_mode: inventory
retention:
  hot_days: 30
  warm_days: 120
  max_age_days: 365
restore:
  default_destination_type: temporary
  temporary_retention_days: 7
  dynamodb_always_new_table: true
  auto_approve_threshold: 100
  dual_approval_threshold: 500
notifications:
  alerts:
    email: chrisbc@artisan.co.nz
  reports:
    # Daily health report delivered via SNS topic + email subscription.
    # Flip enabled: true and fill address: once SNS subscription confirmed.
    email:
      enabled: true
      address: chrisbc@artisan.co.nz
  ses:
    enabled: false
    source_email: noreply-backup@example.com
    recipients: []
  slack:
    enabled: true
    webhook_url_secret: backup-slack-webhook
    channel: '#cwg-automata-notices'
    notify_on:
    - backup_success
    - backup_failure
    - restore_initiated
    - restore_completed
cost_tracking:
  enabled: false
  budget_alerts: false
  monthly_budget: 700
  export_to_s3: null
