# NSHM Backup Configuration Template
# Copy to backup-config.yaml and fill in ACCOUNT_ID (prod: 210987654321)

general:
  region: ap-southeast-2
  environment: production
  lambda_arn: null        # Set after first 'serverless deploy'
  s3_batch_role_arn: null # arn:aws:iam::ACCOUNT_ID:role/nzshm-backup-batch-role
                          # Required when any source has use_s3_batch: true
                          # Create with: python scripts/create-backup-roles.py
  tags:
    Project: NSHM
    ManagedBy: backup-cli
    CostCenter: GNS-Science

sources:
  toshi:
    display_name: "ToshiAPI"
    s3_buckets:
      - arn: arn:aws:s3:::nzshm22-toshi-api-prod
        label: api-prod
    dynamodb_tables:
      - arn:aws:dynamodb:ap-southeast-2:ACCOUNT_ID:table/ToshiFileObject-PROD
      - arn:aws:dynamodb:ap-southeast-2:ACCOUNT_ID:table/ToshiIdentity-PROD
      - arn:aws:dynamodb:ap-southeast-2:ACCOUNT_ID:table/ToshiTableObject-PROD
      - arn:aws:dynamodb:ap-southeast-2:ACCOUNT_ID:table/ToshiThingObject-PROD
    dynamodb_export_format: DYNAMODB_JSON
    use_s3_batch: true   # ~8M objects — must use Batch Operations (set s3_batch_role_arn above)

  ths:
    display_name: "THS_dataset_prod"
    s3_buckets:
      - arn: arn:aws:s3:::ths-dataset-prod
        label: dataset-prod
    dynamodb_export_format: DYNAMODB_JSON
    use_s3_batch: false  # ~1TB but incremental runs are within Lambda timeout

  arkivalist:
    display_name: "Arkivalist"
    # Cross-account source: Arkivalist account 456789012345
    # Backup Lambda (345678901234) assumes source_account_role_arn to read source data.
    # See docs/design/ACCOUNT_ISOLATION.md for IAM setup required.
    source_account_id: null        # 456789012345
    source_account_role_arn: null  # arn:aws:iam::456789012345:role/nzshm-backup-reader
    s3_buckets:
      # Serverless Framework deployment bucket (Lambda zips, CloudFormation templates).
      # Intentional choice: frequent deployments generate real ETag changes, making
      # this a good functional test of the incremental sync mechanism.
      - arn: arn:aws:s3:::arkivalist-api-dev-serverlessdeploymentbucket-oztlskap4vrh
        label: deploy
    dynamodb_tables:
      - arn:aws:dynamodb:ap-southeast-2:456789012345:table/arkivalist-api-dev-events
      - arn:aws:dynamodb:ap-southeast-2:456789012345:table/arkivalist-api-dev-feedback
      - arn:aws:dynamodb:ap-southeast-2:456789012345:table/arkivalist-api-dev-invite-codes
      - arn:aws:dynamodb:ap-southeast-2:456789012345:table/arkivalist-api-dev-mission-events
      - arn:aws:dynamodb:ap-southeast-2:456789012345:table/arkivalist-api-dev-mission-runs
    dynamodb_export_format: DYNAMODB_JSON
    use_s3_batch: false  # small scale — direct copy_object is fine

retention:
  hot_days: 30
  warm_days: 120  # must be >= hot_days + 90 (AWS constraint: GLACIER_IR → DEEP_ARCHIVE gap)
  max_age_days: 365

restore:
  default_destination_type: temporary
  temporary_retention_days: 7
  dynamodb_always_new_table: true
  auto_approve_threshold: 100
  dual_approval_threshold: 500

notifications:
  # Email recipients are list-of-strings; manage them with:
  #   uv run backup notifications apply
  # which reconciles SNS subscriptions on each topic to match these lists.
  alerts:
    # CloudWatch-Lambda-error alarm recipients (fast path)
    emails:
      - oncall@example.com
  reports:
    # Daily health-report delivery — distinct topic so the report audience
    # can differ from the alarm audience (e.g. broader vs on-call only).
    email:
      enabled: true
      addresses:
        - backup-reports@example.com
    # Tunable thresholds for the daily health report. All fields are
    # optional — omit to accept defaults baked into health_report.py.
    health:
      canary_source: weka
      rotation_by_weekday:    # ISO weekday → source to restore-test that day
        0: ths                # Monday
        2: toshi              # Wednesday
        4: static             # Friday
      freshness_threshold_hours: 30.0
      delta_pct_threshold: -5.0     # source-count drop ≥ 5% → red (must be negative)
      delta_abs_threshold: -10000   # OR drop ≥ 10k objects → red (whichever first)
      restore_sample_size: 10
  ses:
    enabled: true
    source_email: noreply-backup@example.com
    recipients:
      - admin@example.com
  slack:
    enabled: false
    webhook_url_secret: backup-slack-webhook
    channel: "#nsdm-backups"
    notify_on:
      - backup_success
      - backup_failure
      - restore_initiated
      - restore_completed

cost_tracking:
  enabled: true
  budget_alerts: true
  monthly_budget: 700
  export_to_s3: null
