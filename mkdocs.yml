site_name: NSHM Backup Solution
site_description: AWS-native backup management CLI for NSHM datasets
site_author: NSHM DevOps Team
repo_url: https://github.com/gns-science/nzshm-backup
repo_name: gns-science/nzshm-backup

theme:
  name: material
  palette:
    primary: teal
    accent: blue
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github
    logo: fontawesome/solid/database

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - mkdocs_click

nav:
  - Home: index.md
  - AWS Backup Comparison: aws-backup-comparison.md
  - Design Docs:
    - Backup Solution Plan: design/backup-solution-plan.md
    - Account Isolation: design/ACCOUNT_ISOLATION.md
    - Retention & Costs: design/retention-strategy-and-costs.md
    - Disaster Recovery: design/disaster-recovery-scenario.md
    - Backup Forensics: design/backup-forensics.md
    - IAM Security Decisions: design/iam-security-decisions.md
    - DynamoDB PITR Watcher: design/dynamodb-pitr-watcher.md
    - S3 Restore Strategy: design/s3-restore-strategy.md
    - CLI-First Rationale: design/CLI_FIRST_RATIONALE.md
    - Typer Rationale: design/TYPER_RATIONALE.md
  - Architecture:
    - Overview: architecture/overview.md
    - Cost Model: architecture/cost-model.md
    - Storage Tiers: architecture/storage-tiers.md
    - S3 Batch Operations: architecture/s3-batch-operations.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - Backup Operations: user-guide/backup.md
    - Restore Operations: user-guide/restore.md
    - Provisioning (backup setup): user-guide/setup.md
    - Testing & Validation: user-guide/testing.md
    - Daily Health Report: user-guide/health-report.md
    - Cost Management: user-guide/costs.md
    - Scheduling: user-guide/scheduling.md
  - CLI Reference: cli-reference.md
  - Operations:
    - Operator Cheatsheet: operations/cheatsheet.md
    - Enabling Notifications: operations/enabling-notifications.md
    - Inventory Bucket Recovery: operations/inventory-bucket-recovery.md
    - Manual Purge from Backup: operations/purge-from-backup.md
    - Health Signal Validation Sandbox: operations/health-signal-validation-sandbox.md
  - Development:
    - Contributing: development/contributing.md
    - Testing: development/testing.md
    - Release Process: development/release.md
    - Lambda Deployment: development/lambda-deployment.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_source: true
            show_bases: true
            merge_init_into_class: true
            docstring_style: google

extra:
  version:
    provider: mike

copyright: Copyright © 2026 NSHM DevOps Team
