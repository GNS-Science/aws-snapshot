[coverage:run]
omit = */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main
    class .*\bProtocol\):
    if TYPE_CHECKING:


[tox:tox]
isolated_build = true
envlist = py310, py311, py312, format, lint, build-linux, build-macos, audit

[gh-actions]
python =
    3.12: py312
    3.11: py311
    3.10: py310, format, lint, build

[testenv]
passenv = *
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
dependency_groups = dev
commands =
    pytest --cov=aws_snapshot --cov-branch --cov-report=xml --cov-report=term-missing tests

[testenv:audit]
dependency_groups = dev
commands =
    uv export --format requirements-txt --no-emit-project -o audit.txt
    pip-audit -r audit.txt --require-hashes

[testenv:format]
dependency_groups = dev
commands =
    ruff format src tests

[testenv:format-check]
dependency_groups = dev
commands =
    ruff format --check src tests

[testenv:lint]
dependency_groups = dev
commands =
    ruff check src tests
    mypy src

[testenv:build-linux]
platform = linux
dependency_groups = dev
commands =
    uv build

[testenv:build-macos]
platform = darwin
dependency_groups = dev
commands =
    uv build
