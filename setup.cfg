[coverage:run]
omit = */__init__.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    def main
    class .*\bProtocol\):
    if TYPE_CHECKING:


[tox:tox]
isolated_build = true
envlist = py310, py311, py312, format, lint, build-linux, build-macos, audit

[gh-actions]
python =
    3.12: py312
    3.11: py311
    3.10: py310, format, lint, build

[testenv]
# Pass through only the env vars tests legitimately need. Notably
# absent: AWS_* and BACKUP_* — those are forced to fake values via
# `setenv` below so tests cannot accidentally hit real AWS or pick up
# operator-side state (an expired SSO session in the shell used to
# fail the suite with InvalidClientTokenId).
passenv =
    HOME
    USER
    LANG
    LC_*
    TERM
    CI
    GITHUB_*
    PYTEST_*
setenv =
    PYTHONPATH = {toxinidir}
    PYTHONWARNINGS = ignore
    # Force-fake AWS credentials. Belt-and-braces with the conftest.py
    # _clean_env autouse fixture; this layer catches even if a test
    # bypasses the fixture (e.g. one that instantiates boto3 in module
    # scope before any fixture runs).
    AWS_ACCESS_KEY_ID = testing
    AWS_SECRET_ACCESS_KEY = testing
    AWS_SECURITY_TOKEN = testing
    AWS_SESSION_TOKEN = testing
    AWS_DEFAULT_REGION = ap-southeast-2
    AWS_REGION = ap-southeast-2
dependency_groups = dev
commands =
    pytest --cov=aws_snapshot --cov-branch --cov-report=xml --cov-report=term-missing tests

[testenv:audit]
dependency_groups = dev
commands =
    uv export --format requirements-txt --no-emit-project -o audit.txt
    pip-audit -r audit.txt --require-hashes

[testenv:format]
dependency_groups = dev
commands =
    ruff format src tests

[testenv:format-check]
dependency_groups = dev
commands =
    ruff format --check src tests

[testenv:lint]
dependency_groups = dev
commands =
    ruff check src tests
    mypy src

[testenv:build-linux]
platform = linux
dependency_groups = dev
commands =
    uv build

[testenv:build-macos]
platform = darwin
dependency_groups = dev
commands =
    uv build
