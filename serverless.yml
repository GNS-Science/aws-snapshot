org: gnssciencenshm
app: nzshm-backup
service: nzshm-backup-service

frameworkVersion: "4"

provider:
  name: aws
  runtime: python3.10
  region: ap-southeast-2
  deploymentPrefix: nzshm-backup
  # accountId guard not supported by Serverless Framework v4 — enforce via AWS SSO profile
  memorySize: 1024
  timeout: 900
  environment:
    NZSHM_STAGE: ${sls:stage}
    PYTHONPATH: /var/task/src
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:ListBucket
            - s3:GetObject
            - s3:PutObject
            - s3:CopyObject
            - s3:CreateBucket
            - s3:GetBucketLocation
            - s3:GetBucketTagging
            - s3:GetBucketVersioning
            - s3:PutLifecycleConfiguration
            - s3:PutBucketPolicy
            - s3:PutBucketTagging
            - s3:PutBucketVersioning
            - s3:GetBucketAcl
          Resource:
            - "*"
        - Effect: Allow
          Action:
            - sts:GetCallerIdentity
            - sts:AssumeRole
          Resource: "*"
        - Effect: Allow
          Action:
            - dynamodb:ExportTableToPointInTime
            - dynamodb:DescribeExport
            - dynamodb:DescribeTable
            - dynamodb:UpdateContinuousBackups
            - dynamodb:TagResource
          Resource: "*"
        - Effect: Allow
          Action:
            - s3:CreateJob
            - s3:DescribeJob
            - s3:ListJobs
            - s3control:CreateJob
            - s3control:DescribeJob
            - s3control:ListJobs
          Resource: "*"  # S3 Batch Operations does not support resource-level ARN scoping
        - Effect: Allow
          Action:
            - iam:PassRole
          Resource: ${env:S3_BATCH_ROLE_ARN, "arn:aws:iam::*:role/nzshm-backup-batch-role"}
        - Effect: Allow
          Action:
            - events:PutRule
            - events:PutTargets
            - events:ListRules
            - events:EnableRule
            - events:DisableRule
          Resource: "*"
        - Effect: Allow
          Action:
            - ssm:GetParameter
            - ssm:PutParameter
          Resource: "arn:aws:ssm:ap-southeast-2:*:parameter/nzshm-backup/*"
        - Effect: Allow
          Action:
            - athena:StartQueryExecution
            - athena:GetQueryExecution
            - athena:GetQueryResults
            - athena:ListDatabases
            - athena:ListTables
            - athena:GetDatabase
            - athena:GetTableMetadata
          Resource: "*"
        - Effect: Allow
          Action:
            - glue:GetDatabase
            - glue:CreateDatabase
            - glue:GetTable
            - glue:GetTables
            - glue:CreateTable
            - glue:UpdateTable
            - glue:DeleteTable
            - glue:GetPartition
            - glue:GetPartitions
            - glue:CreatePartition
            - glue:BatchCreatePartition
            - glue:DeletePartition
            - glue:UpdatePartition
            - glue:BatchDeletePartition
          Resource: "*"
        # NOTE: NO s3:DeleteObject - backup buckets are delete-protected

functions:
  pitr-watcher:
    handler: nzshm_backup.lambda_pitr_watcher.handler
    description: Re-enable PITR on DynamoDB tables after restore completes
    memorySize: 256
    timeout: 60
    environment:
      PITR_WATCHER_RULE_NAME: nzshm-backup-pitr-watcher
    events:
      - eventBridge:
          enabled: false
          name: nzshm-backup-pitr-watcher
          schedule: rate(5 minutes)
          description: Poll SSM for pending DynamoDB restores and re-enable PITR

  backup:
    handler: nzshm_backup.lambda_handler.handler
    description: Backup orchestration for NSHM datasets
    # No default EventBridge triggers — schedules are managed per-source via
    # `backup schedule add` which creates named rules targeting this Lambda.

custom:
  # Stage name (prod, sandbox) does not match the config file suffix
  # (production, sandbox). Map explicitly here rather than renaming
  # files — the existing names are referenced by deploy runbooks and
  # BACKUP_CONFIG_PATH.
  configFiles:
    prod: backup-config.production.yaml
    sandbox: backup-config.sandbox.yaml
  config: ${file(${self:custom.configFiles.${sls:stage}, 'backup-config.production.yaml'})}
  alertEmail: ${self:custom.config.notifications.alerts.email, ''}
  pythonRequirements:
    dockerizePip: true
    slim: true

resources:
  Conditions:
    HasAlertEmail:
      Fn::Not:
        - Fn::Equals:
            - ${self:custom.alertEmail}
            - ''
  Resources:
    BackupAlertsTopic:
      Type: AWS::SNS::Topic
      Properties:
        TopicName: nzshm-backup-alerts-${sls:stage}
        DisplayName: NSHM Backup Alerts (${sls:stage})

    BackupAlertEmailSubscription:
      Type: AWS::SNS::Subscription
      Condition: HasAlertEmail
      Properties:
        TopicArn: !Ref BackupAlertsTopic
        Protocol: email
        Endpoint: ${self:custom.alertEmail}

    BackupLambdaErrorAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: nzshm-backup-lambda-errors-${sls:stage}
        AlarmDescription: Backup Lambda invocation errors (ADR-005 fast path)
        Namespace: AWS/Lambda
        MetricName: Errors
        Dimensions:
          - Name: FunctionName
            Value: !Ref BackupLambdaFunction
        Statistic: Sum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
        AlarmActions:
          - !Ref BackupAlertsTopic
        OKActions:
          - !Ref BackupAlertsTopic

package:
  individually: true
  patterns:
    - "!**.git/**"
    - "!**.pytest_cache/**"
    - "!**.mypy_cache/**"
    - "!**tests/**"
    - "!**docs/**"
    - "!**.venv/**"
