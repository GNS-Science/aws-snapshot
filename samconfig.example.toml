# samconfig example for nzshm-backup
#
# Copy to `samconfig.toml` and customise. The committed file in this
# repo is the OSS template — operational installs should override the
# parameters below for their account / region / IAM names.
#
# For GNS-internal installs, the pinned-values version of this file
# lives in the private `nzshm-backup-ops` shim repo. See
# https://github.com/GNS-Science/nzshm-backup/issues/48.

version = 0.1

[default]
[default.deploy.parameters]
stack_name      = "nzshm-backup-service-prod"
region          = "ap-southeast-2"
s3_prefix       = "nzshm-backup-sam"
capabilities    = "CAPABILITY_NAMED_IAM"
confirm_changeset = true
fail_on_empty_changeset = false
# NOTE: parameter_overrides MUST be a single-line string. SAM passes the
# multi-line TOML form (""" """) through with embedded newlines, which
# CloudFormation rejects with "Parameter 'Stage' must be one of AllowedValues"
# (the trailing newline ends up in the value of each parameter).
parameter_overrides = "Stage=prod ServiceName=nzshm-backup-service BatchRoleArn=arn:aws:iam::123456789012:role/nzshm-backup-batch-role SlackWebhookSecretName=backup-slack-webhook DiscordWebhookSecretName="
# DiscordWebhookSecretName left empty above = Slack-only deployment
# (default). To use Discord native embeds in the alarm-bridge instead,
# set DiscordWebhookSecretName=backup-discord-webhook. The Discord
# secret should hold a webhook URL of the form
# https://discord.com/api/webhooks/{id}/{token} (NO /slack suffix).

[default.build.parameters]
# Template file is sam.yaml, not SAM's default template.yaml — see
# https://github.com/GNS-Science/nzshm-backup/pull/51#discussion_r3464484646
#
# This must live under [default.build.parameters], NOT
# [default.global.parameters]. A global template_file is honored by
# `sam deploy` too, which then bypasses `.aws-sam/build/template.yaml`
# (the output of `sam build`) and uploads from the source `CodeUri: ./`
# instead — packaging the entire repo into the Lambda artefact. Lambda
# then errors at cold-start with "No module named '<package>'" because
# the source code lives in `src/<package>/`, not at root. See PR #56
# for the post-mortem on the trap.
template_file = "sam.yaml"
use_container = true

# Optional: a separate sandbox profile for non-prod testing.
#
# [sandbox]
# [sandbox.deploy.parameters]
# stack_name      = "nzshm-backup-service-sandbox"
# region          = "ap-southeast-2"
# parameter_overrides = "Stage=sandbox ..."
